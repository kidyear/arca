name: Build Windows Installer

# 两种触发方式：
# 1. 手动：GitHub 仓库页 → Actions → Build Windows Installer → Run workflow
# 2. 打 tag：git tag v1.4.0-win.1 && git push --tags
on:
  workflow_dispatch:
  push:
    tags: ['v*']

# 新仓库 GITHUB_TOKEN 默认只读;建 Release 需要写权限
permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 公司内网更新源:从仓库变量注入(不写死在公开源码里);没配变量则留空(自动更新关闭)
      - name: Inject company update source
        run: 'echo "{ ""updateUrl"": ""${{ vars.COMPANY_UPDATE_URL }}"" }" > electron/company.json'
        shell: bash

      # node-pty 1.1.0 已带 Windows x64 预编译包；缺失时才回退 Electron ABI rebuild。
      # 强制 rebuild 在 GitHub Windows runner 上容易被 VS Build Tools 探测问题卡住。
      - name: Prepare node-pty for Electron
        shell: pwsh
        run: |
          $prebuild = Join-Path $PWD 'node_modules\node-pty\prebuilds\win32-x64\conpty.node'
          if (Test-Path $prebuild) {
            Write-Host "Using bundled node-pty Windows prebuild: $prebuild"
          } else {
            Write-Host "node-pty Windows prebuild missing; rebuilding for Electron ABI"
            npx electron-rebuild -f -w node-pty
          }

      - name: Build NSIS installer
        run: npx electron-builder --win --publish never
        env:
          # 不签名：内部分发版。要消除 SmartScreen 提示再配企业代码签名证书
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Arca-Windows-Setup
          path: dist/Arca-Setup-*.exe
          if-no-files-found: error

      - name: Prepare release notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $version = $tag -replace '^v', ''
          $text = Get-Content CHANGELOG.md -Raw
          $pattern = "(?ms)^## \[$([regex]::Escape($version))\].*?(?=\r?\n## \[|\z)"
          $match = [regex]::Match($text, $pattern)
          if ($match.Success) {
            $notes = $match.Value.Trim()
          } else {
            $notes = "## $tag`n`nWindows installer build for $tag."
          }
          Set-Content -Path release-notes.md -Value $notes -Encoding utf8

      # 打 tag 触发时顺手发成 GitHub Release，员工直接从 Releases 页下载
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Arca-Setup-*.exe
          body_path: release-notes.md
